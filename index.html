<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F3F1EC">
  <title>AppСтрой</title>
  <style>
    html,body{margin:0;width:100%;height:100%;background:#f3f1ec;font-family:Arial,sans-serif}
    body{display:grid;place-items:center;color:#303235}
  </style>
</head>
<body>
  <div>Загрузка AppСтрой…</div>
  <script>
    (function () {
      var scopeKey = 'appstroy:last-employee-object-scope';
      var pendingKey = 'appstroy:payments-scope-pending';
      var originalFetch = window.fetch.bind(window);
      var originalXhrOpen = XMLHttpRequest.prototype.open;

      function readScope() {
        try { return sessionStorage.getItem(scopeKey) || ''; } catch (_) { return ''; }
      }

      function writeScope(value) {
        try { sessionStorage.setItem(scopeKey, value || ''); } catch (_) {}
      }

      function readPending() {
        try { return sessionStorage.getItem(pendingKey) === '1'; } catch (_) { return false; }
      }

      function writePending(value) {
        try { sessionStorage.setItem(pendingKey, value ? '1' : '0'); } catch (_) {}
      }

      function cleanEq(value) {
        if (!value) return '';
        return value.indexOf('eq.') === 0 ? value.slice(3) : value;
      }

      function patchEmployeesUrl(value) {
        try {
          var url = new URL(value, window.location.href);
          if (url.pathname.indexOf('/rest/v1/employees') === -1) return value;

          var objectFilter = url.searchParams.get('object_name');
          var activeFilter = url.searchParams.get('is_active');

          if (objectFilter || !activeFilter) {
            writeScope(cleanEq(objectFilter));
            writePending(true);
            return url.toString();
          }

          if (!objectFilter && activeFilter === 'eq.true' && readPending()) {
            var objectName = readScope();
            url.searchParams.delete('is_active');
            if (objectName) url.searchParams.set('object_name', 'eq.' + objectName);
            writePending(false);
            return url.toString();
          }

          return url.toString();
        } catch (_) {
          return value;
        }
      }

      window.fetch = function (input, init) {
        if (input instanceof Request) {
          return originalFetch(
            new Request(patchEmployeesUrl(input.url), input),
            init
          );
        }
        return originalFetch(patchEmployeesUrl(String(input)), init);
      };

      XMLHttpRequest.prototype.open = function (method, url) {
        var args = Array.prototype.slice.call(arguments);
        args[1] = patchEmployeesUrl(String(url));
        return originalXhrOpen.apply(this, args);
      };

      originalFetch('404.html?v=payments-scope-3', { cache: 'no-store' })
        .then(function (response) {
          if (!response.ok) throw new Error('Не удалось загрузить приложение');
          return response.text();
        })
        .then(function (html) {
          var basePath = window.location.pathname.indexOf('/app/') === 0
            ? '/app/'
            : '/appstroy-web/';
          html = html.replace(/<base href="[^"]*">/, '<base href="' + basePath + '">');
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function (error) {
          document.body.textContent = 'Ошибка загрузки AppСтрой: ' + error.message;
        });
    })();
  </script>
</body>
</html>
