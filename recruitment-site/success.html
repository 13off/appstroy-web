<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080808">
  <title>Заявка отправлена — СКБС Работа</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .success-page{min-height:100svh;display:grid;place-items:center;padding:32px}.success-card{width:min(620px,100%);padding:clamp(30px,6vw,64px);text-align:center;border:1px solid rgba(216,173,85,.2);border-radius:32px;background:radial-gradient(circle at 50% 0,rgba(216,173,85,.13),transparent 42%),#111;box-shadow:0 28px 80px rgba(0,0,0,.48)}.success-icon{width:76px;height:76px;margin:0 auto 24px;display:grid;place-items:center;border-radius:24px;color:#14100a;font-size:34px;font-weight:800;background:linear-gradient(135deg,#f0d18a,#d8ad55 55%,#b9822f)}.success-card h1{font-size:clamp(38px,8vw,60px);margin:0 0 16px}.success-card p{color:#aaa59b;font-size:17px;margin-bottom:30px}
  </style>
</head>
<body>
  <main class="success-page">
    <section class="success-card">
      <div class="success-icon">✓</div>
      <div class="eyebrow"><span></span> Заявка принята</div>
      <h1>Спасибо за отклик</h1>
      <p>Ваши данные сохранены. Специалист свяжется с вами, чтобы уточнить опыт, документы и возможную дату заезда.</p>
      <a class="button button--gold" href="index.html">Вернуться на сайт</a>
    </section>
  </main>
</body>
</html>
